<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bridge structure -->
  <path d="M 10 70 Q 50 30, 90 70" stroke="url(#grad)" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Bridge supports -->
  <line x1="30" y1="55" x2="30" y2="75" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="40" x2="50" y2="75" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="55" x2="70" y2="75" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="5" y1="75" x2="95" y2="75" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
</svg>
